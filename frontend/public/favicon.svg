<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- MindFeed app icon — Constellation M on the midnight observatory sky. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="95%">
      <stop offset="0%" stop-color="#181f33"/>
      <stop offset="55%" stop-color="#0d111c"/>
      <stop offset="100%" stop-color="#0a0d15"/>
    </radialGradient>
    <radialGradient id="wash" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffe3ac"/>
      <stop offset="55%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="56" y1="304" x2="328" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8942e"/>
      <stop offset="50%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#wash)"/>

  <!-- faint field stars -->
  <circle cx="96"  cy="88"  r="5"   fill="#ffe3ac" fill-opacity="0.5"/>
  <circle cx="430" cy="120" r="4"   fill="#ffe3ac" fill-opacity="0.4"/>
  <circle cx="452" cy="330" r="5.5" fill="#ffe3ac" fill-opacity="0.45"/>
  <circle cx="80"  cy="392" r="3.5" fill="#ffe3ac" fill-opacity="0.35"/>
  <circle cx="256" cy="60"  r="3.5" fill="#ffe3ac" fill-opacity="0.4"/>

  <!-- star-chart ring -->
  <circle cx="256" cy="264" r="172" stroke="#f0a13c" stroke-opacity="0.20"
          stroke-width="9" stroke-dasharray="22 39" stroke-linecap="round"/>

  <!-- constellation M (48u mark × 8.4, centered) -->
  <g transform="translate(54.4 54.4) scale(8.4)">
    <path d="M9.5 37 L11 14.5 L24 29.5 L37 14.5 L38.5 37"
          stroke="url(#line)" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" stroke-opacity="0.85"
          transform="translate(0 0.5)"/>
    <g transform="translate(0 0.5)">
      <circle cx="9.5" cy="37" r="6.5" fill="url(#glow)"/>
      <circle cx="11" cy="14.5" r="8" fill="url(#glow)"/>
      <circle cx="24" cy="29.5" r="7" fill="url(#glow)"/>
      <circle cx="37" cy="14.5" r="8.5" fill="url(#glow)"/>
      <circle cx="38.5" cy="37" r="6.5" fill="url(#glow)"/>
      <circle cx="9.5" cy="37"  r="2.5" fill="url(#star)"/>
      <circle cx="11"  cy="14.5" r="3.3" fill="url(#star)"/>
      <circle cx="24"  cy="29.5" r="2.8" fill="url(#star)"/>
      <circle cx="37"  cy="14.5" r="3.3" fill="url(#star)"/>
      <circle cx="38.5" cy="37"  r="2.5" fill="url(#star)"/>
      <path d="M37 7.5v3.4M37 18.1v3.4M31.7 14.5h3.4M38.9 14.5h3.4"
            stroke="#ffd98f" stroke-width="1" stroke-linecap="round" stroke-opacity="0.9"/>
    </g>
  </g>
</svg>
