<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- MindFeed app icon — idea bulb with a constellation-M filament,
       on the midnight observatory sky. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="95%">
      <stop offset="0%" stop-color="#181f33"/>
      <stop offset="55%" stop-color="#0d111c"/>
      <stop offset="100%" stop-color="#0a0d15"/>
    </radialGradient>
    <radialGradient id="wash" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffe3ac"/>
      <stop offset="55%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="100" y1="290" x2="310" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8942e"/>
      <stop offset="50%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#wash)"/>

  <!-- faint field stars -->
  <circle cx="92"  cy="96"  r="5"   fill="#ffe3ac" fill-opacity="0.5"/>
  <circle cx="426" cy="128" r="4"   fill="#ffe3ac" fill-opacity="0.4"/>
  <circle cx="446" cy="330" r="5.5" fill="#ffe3ac" fill-opacity="0.45"/>
  <circle cx="82"  cy="388" r="3.5" fill="#ffe3ac" fill-opacity="0.35"/>

  <!-- bulb group: 48u mark × 8.6, centered -->
  <g transform="translate(49.6 42) scale(8.6)" stroke-linecap="round">
    <circle cx="24" cy="20" r="16" fill="url(#glow)" opacity="0.55"/>
    <path d="M17.9 34.5c.4-2.9-.8-4.8-2.6-6.7C13.2 25.6 12 23 12 20a12 12 0 1 1 24 0c0 3-1.2 5.6-3.3 7.8-1.8 1.9-3 3.8-2.6 6.7"
          stroke="url(#line)" stroke-width="2.2"/>
    <path d="M18.4 38.4h11.2" stroke="url(#line)" stroke-width="2.2"/>
    <path d="M20.6 42h6.8" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.75"/>
    <path d="M17.6 24 L21.4 16.8 L25 24 L29.2 16.8 L30.4 20.2"
          stroke="#ffd98f" stroke-width="1.7" stroke-linejoin="round" stroke-opacity="0.95"/>
    <circle cx="17.6" cy="24"   r="4.6" fill="url(#glow)"/>
    <circle cx="21.4" cy="16.8" r="5.4" fill="url(#glow)"/>
    <circle cx="29.2" cy="16.8" r="5.4" fill="url(#glow)"/>
    <circle cx="17.6" cy="24"   r="1.7" fill="url(#star)"/>
    <circle cx="21.4" cy="16.8" r="2.1" fill="url(#star)"/>
    <circle cx="25"   cy="24"   r="1.8" fill="url(#star)"/>
    <circle cx="29.2" cy="16.8" r="2.1" fill="url(#star)"/>
    <circle cx="30.4" cy="20.2" r="1.5" fill="url(#star)"/>
    <path d="M40.5 9.5v3M39 11h3" stroke="#ffd98f" stroke-width="1" stroke-opacity="0.85"/>
  </g>
</svg>
