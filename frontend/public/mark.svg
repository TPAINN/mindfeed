<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- MindFeed mark — "Constellation M": a star-chart M on a faint
       astronomical ring. Midnight Observatory brand, amber starlight. -->
  <defs>
    <radialGradient id="mf-star" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffe3ac"/>
      <stop offset="55%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </radialGradient>
    <radialGradient id="mf-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mf-line" x1="7" y1="38" x2="41" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8942e"/>
      <stop offset="50%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </linearGradient>
  </defs>

  <!-- star-chart ring -->
  <circle cx="24" cy="25" r="20.5" stroke="#f0a13c" stroke-opacity="0.20"
          stroke-width="1.1" stroke-dasharray="2.6 4.6" stroke-linecap="round"/>

  <!-- constellation lines -->
  <path d="M9.5 37 L11 14.5 L24 29.5 L37 14.5 L38.5 37"
        stroke="url(#mf-line)" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" stroke-opacity="0.8"/>

  <!-- star glows -->
  <circle cx="9.5" cy="37" r="6.5" fill="url(#mf-glow)"/>
  <circle cx="11" cy="14.5" r="8" fill="url(#mf-glow)"/>
  <circle cx="24" cy="29.5" r="7" fill="url(#mf-glow)"/>
  <circle cx="37" cy="14.5" r="8.5" fill="url(#mf-glow)"/>
  <circle cx="38.5" cy="37" r="6.5" fill="url(#mf-glow)"/>

  <!-- constellation stars -->
  <circle cx="9.5" cy="37"  r="2.5" fill="url(#mf-star)"/>
  <circle cx="11"  cy="14.5" r="3.3" fill="url(#mf-star)"/>
  <circle cx="24"  cy="29.5" r="2.8" fill="url(#mf-star)"/>
  <circle cx="37"  cy="14.5" r="3.3" fill="url(#mf-star)"/>
  <circle cx="38.5" cy="37"  r="2.5" fill="url(#mf-star)"/>

  <!-- north-star sparkle on the right peak -->
  <path d="M37 7.5v3.4M37 18.1v3.4M31.7 14.5h3.4M38.9 14.5h3.4"
        stroke="#ffd98f" stroke-width="1" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- minor field stars -->
  <circle cx="17.5" cy="8"  r="1.15" fill="#ffe3ac" fill-opacity="0.85"/>
  <circle cx="31"   cy="41.5" r="1.0" fill="#ffe3ac" fill-opacity="0.55"/>
  <circle cx="44"   cy="24" r="1.25" fill="#ffe3ac" fill-opacity="0.7"/>
  <circle cx="5"    cy="22" r="0.9" fill="#ffe3ac" fill-opacity="0.5"/>
</svg>
