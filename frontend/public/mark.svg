<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- MindFeed mark — an idea bulb whose filament is a constellation "M".
       Midnight Observatory brand: amber starlight, clean strokes. -->
  <defs>
    <radialGradient id="mf-star" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffe3ac"/>
      <stop offset="55%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </radialGradient>
    <radialGradient id="mf-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mf-line" x1="12" y1="34" x2="36" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8942e"/>
      <stop offset="50%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </linearGradient>
  </defs>

  <!-- soft glass glow behind the dome -->
  <circle cx="24" cy="20" r="16" fill="url(#mf-glow)" opacity="0.55"/>

  <!-- bulb glass: dome with waisted neck -->
  <path d="M17.9 34.5c.4-2.9-.8-4.8-2.6-6.7C13.2 25.6 12 23 12 20a12 12 0 1 1 24 0c0 3-1.2 5.6-3.3 7.8-1.8 1.9-3 3.8-2.6 6.7"
        stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- screw base -->
  <path d="M18.4 38.4h11.2" stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M20.6 42h6.8" stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.75"/>

  <!-- filament: a small constellation M -->
  <path d="M17.6 24 L21.4 16.8 L25 24 L29.2 16.8 L30.4 20.2"
        stroke="#ffd98f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
        stroke-opacity="0.95"/>
  <circle cx="17.6" cy="24"   r="4.6" fill="url(#mf-glow)"/>
  <circle cx="21.4" cy="16.8" r="5.4" fill="url(#mf-glow)"/>
  <circle cx="29.2" cy="16.8" r="5.4" fill="url(#mf-glow)"/>
  <circle cx="17.6" cy="24"   r="1.7" fill="url(#mf-star)"/>
  <circle cx="21.4" cy="16.8" r="2.1" fill="url(#mf-star)"/>
  <circle cx="25"   cy="24"   r="1.8" fill="url(#mf-star)"/>
  <circle cx="29.2" cy="16.8" r="2.1" fill="url(#mf-star)"/>
  <circle cx="30.4" cy="20.2" r="1.5" fill="url(#mf-star)"/>

  <!-- night sparkles around the glass -->
  <path d="M40.5 9.5v3M39 11h3" stroke="#ffd98f" stroke-width="1" stroke-linecap="round" stroke-opacity="0.85"/>
  <circle cx="7.5" cy="12" r="1.1" fill="#ffe3ac" fill-opacity="0.7"/>
  <circle cx="41"  cy="27" r="1"   fill="#ffe3ac" fill-opacity="0.55"/>
  <circle cx="10"  cy="31" r="0.9" fill="#ffe3ac" fill-opacity="0.5"/>
</svg>
