<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- MindFeed mark, dark-surface line version — the idea bulb with the
       brain inside, amber starlight strokes. Same geometry as favicon.svg. -->
  <defs>
    <radialGradient id="mf-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a13c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0a13c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mf-line" x1="12" y1="36" x2="36" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8942e"/>
      <stop offset="50%" stop-color="#f7bd66"/>
      <stop offset="100%" stop-color="#e8942e"/>
    </linearGradient>
  </defs>

  <circle cx="24" cy="20" r="16" fill="url(#mf-glow)" opacity="0.6"/>

  <!-- bulb glass -->
  <path d="M17.9 34.5c.4-2.9-.8-4.8-2.6-6.7C13.2 25.6 12 23 12 20a12 12 0 1 1 24 0c0 3-1.2 5.6-3.3 7.8-1.8 1.9-3 3.8-2.6 6.7"
        stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- screw base -->
  <path d="M18.3 38.3h11.4" stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M19.2 41.9h9.6" stroke="url(#mf-line)" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- brain -->
  <g transform="translate(24 19.2) scale(0.84) translate(-24 -19.2)">
    <path d="M23.2 13.6
             c-1.3-1-3.2-.9-4.4.1
             c-1.6-.6-3.4.1-4.1 1.6
             c-1.3.5-2 1.9-1.7 3.2
             c-.9 1-.9 2.5 0 3.5
             c-.2 1.4.7 2.7 2 3.1
             c.6 1.2 2 1.8 3.3 1.5
             c.9.9 2.3 1.1 3.4.5
             l1.5-.9
             L23.2 13.6 Z"
          fill="#f7bd66" fill-opacity="0.14" stroke="#ffd98f" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M23.2 13.6
             c-1.3-1-3.2-.9-4.4.1
             c-1.6-.6-3.4.1-4.1 1.6
             c-1.3.5-2 1.9-1.7 3.2
             c-.9 1-.9 2.5 0 3.5
             c-.2 1.4.7 2.7 2 3.1
             c.6 1.2 2 1.8 3.3 1.5
             c.9.9 2.3 1.1 3.4.5
             l1.5-.9
             L23.2 13.6 Z"
          fill="#f7bd66" fill-opacity="0.14" stroke="#ffd98f" stroke-width="1.5" stroke-linejoin="round"
          transform="translate(48 0) scale(-1 1)"/>
    <g stroke="#f0a13c" stroke-width="1.4" fill="none" stroke-linecap="round">
      <path d="M17.1 16.3c1.1.2 1.9 1 2.1 2.1"/>
      <path d="M14.5 20.4c.9-.7 2.2-.7 3.1.1"/>
      <path d="M19.5 22c.3 1 .9 1.7 1.9 2"/>
      <path d="M30.9 16.3c-1.1.2-1.9 1-2.1 2.1"/>
      <path d="M33.5 20.4c-.9-.7-2.2-.7-3.1.1"/>
      <path d="M28.5 22c-.3 1-.9 1.7-1.9 2"/>
    </g>
  </g>

  <!-- night sparkle -->
  <path d="M40.5 9.5v3M39 11h3" stroke="#ffd98f" stroke-width="1" stroke-linecap="round" stroke-opacity="0.85"/>
</svg>
