name: keep-alive

# Render's free tier spins the API down after ~15 min idle, so the first request
# after a quiet spell eats a ~30s cold start. This pings the lightweight health
# endpoint every 10 minutes so the service stays warm and the app loads fast.
# (The ping itself absorbs any cold start, so users almost always hit a warm server.)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          URL="https://mindfeed-api.onrender.com/api/status"
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 50 "$URL" || echo 000)
            echo "attempt $attempt → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is awake."
              exit 0
            fi
            sleep 15
          done
          echo "API did not return 200 after 5 attempts (it may still be waking up)."
          # Don't fail the workflow on a cold-start miss — the next run retries.
          exit 0
